<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Pantalla de resultados</title>
    <style>
        :root {
            --bg: #060910;
            --panel: #0f1730;
            --border: #2bd67b;
            --text: #ecfff2;
            --muted: #9dc3ae;
            --dead: #ff7a7a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #13213f 0%, var(--bg) 65%);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .panel {
            max-width: 960px;
            margin: 0 auto;
            background: linear-gradient(180deg, #14234a, var(--panel));
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px;
            letter-spacing: 0.04em;
        }

        .meta {
            margin: 0 0 14px;
            color: var(--muted);
            font-size: 14px;
        }

        .leader {
            margin: 0 0 12px;
            padding: 10px;
            border: 1px solid rgba(43, 214, 123, 0.5);
            border-radius: 10px;
            background: rgba(43, 214, 123, 0.08);
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 18px;
        }

        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            text-align: left;
        }

        th { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }

        .dead { color: var(--dead); font-weight: 700; }
        .alive { color: var(--border); font-weight: 700; }

        .muted { color: var(--muted); }
    </style>
</head>
<body>
    <section class="panel">
        <h1>Space Invaders - Scoreboard</h1>
        <p class="meta">Pantalla: <strong id="screenIdLabel">{{ screen_id }}</strong></p>
        <p class="leader" id="leaderText">Esperando datos de partida...</p>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Jugador</th>
                    <th>Puntos</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tablaJugadores">
                <tr>
                    <td colspan="4" class="muted">Sin datos todavia.</td>
                </tr>
            </tbody>
        </table>
    </section>

    <script type="module">
        import {
            FetchApiConexion,
            JsonEnvio,
            JsonRecibo,
            Traductor,
        } from "{{ url_for('.static', filename='js/comunicacion/core.js') }}";

        const COMANDO_ESTADO_JUGADORES = 'ESTADO_JUGADORES';

        (function () {
            const screenId = {{ screen_id | tojson }};
            const leaderText = document.getElementById('leaderText');
            const tablaJugadores = document.getElementById('tablaJugadores');
            let recepcionActiva = false;

            function renderizarJugadores(jugadores) {
                if (!Array.isArray(jugadores) || jugadores.length === 0) {
                    tablaJugadores.innerHTML = '<tr><td colspan="4" class="muted">Sin datos todavia.</td></tr>';
                    leaderText.textContent = 'Esperando datos de partida...';
                    return;
                }

                const ordenados = jugadores
                    .map((item) => ({
                        player: typeof item.nombreJugador === 'string'
                            ? item.nombreJugador
                            : (typeof item.player === 'string' ? item.player : 'Jugador'),
                        score: Number.isFinite(item.puntuacion)
                            ? item.puntuacion
                            : (Number.isFinite(item.score) ? item.score : 0),
                        dead: typeof item.muerto === 'boolean' ? item.muerto : Boolean(item.dead),
                    }))
                    .sort((a, b) => b.score - a.score);

                const lider = ordenados[0];
                leaderText.textContent = `Lider: ${lider.player} con ${lider.score} puntos`;

                tablaJugadores.innerHTML = ordenados
                    .map((item, index) => {
                        const estadoLabel = item.dead ? 'MUERTO' : 'VIVO';
                        const estadoClass = item.dead ? 'dead' : 'alive';
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${item.player}</td>
                                <td>${item.score}</td>
                                <td class="${estadoClass}">${estadoLabel}</td>
                            </tr>
                        `;
                    })
                    .join('');
            }

            class EstadoJugadoresPantallaEvento {
                constructor(onEstadoJugadores) {
                    this.onEstadoJugadores = onEstadoJugadores;
                }

                async hacer(payload, _contexto) {
                    if (typeof payload !== 'string') {
                        return;
                    }

                    let data;
                    try {
                        data = JSON.parse(payload);
                    } catch {
                        return;
                    }

                    if (!data || data.comando !== COMANDO_ESTADO_JUGADORES || !Array.isArray(data.jugadores)) {
                        return;
                    }

                    this.onEstadoJugadores(data.jugadores);
                }
            }

            function esperar(ms) {
                return new Promise((resolve) => window.setTimeout(resolve, ms));
            }

            async function iniciarCanalPantalla() {
                const conexion = new FetchApiConexion(
                    'api/event',
                    'api/updates',
                    {
                        pollingQueryKey: 'screenId',
                        pollingQueryValue: screenId,
                        pollingIntervalMs: 1000,
                    }
                );

                const recibo = new JsonRecibo().conEvento(
                    COMANDO_ESTADO_JUGADORES,
                    new EstadoJugadoresPantallaEvento(renderizarJugadores)
                );

                const traductor = new Traductor(conexion, new JsonEnvio(), recibo);
                await conexion.conectar();

                recepcionActiva = true;
                while (recepcionActiva) {
                    try {
                        await traductor.recibirYProcesar();
                    } catch (_error) {
                        if (!recepcionActiva) {
                            break;
                        }
                        await esperar(250);
                    }
                }
            }

            window.addEventListener('beforeunload', () => {
                recepcionActiva = false;
            });

            iniciarCanalPantalla().catch(() => {
                leaderText.textContent = 'No se pudo iniciar el canal de pantalla.';
            });
        })();
    </script>
</body>
</html>
