<form class="auth-card" [formGroup]="form" (ngSubmit)="onSubmit()">
	<div class="card-header">
		<h2>Iniciar sesión</h2> <br />
		<p>Introduce tus credenciales para continuar.</p>
	</div>

	<div class="form-grid">
		<label class="field">
			<span>Email</span>
			<input
				type="email"
				formControlName="email"
				placeholder="tu@email.com"
				autocomplete="email"
			/>
			<p class="field-error" *ngIf="getFieldError('email') as emailError">{{ emailError }}</p>
		</label>

		<label class="field">
			<span>Contrasena</span>
			<input
				type="password"
				formControlName="password"
				placeholder="********"
				autocomplete="current-password"
			/>
			<p class="field-error" *ngIf="getFieldError('password') as passwordError">{{ passwordError }}</p>
		</label>
	</div>

	<p class="form-error" *ngIf="error">{{ error }}</p>

	<div class="button-row">
		<generic-button color="purple" buttonType="submit" [class.disabled]="form.invalid">
			Entrar
		</generic-button>
	</div>

	<p class="hint">
		Aun no tienes cuenta?
		<a class="auth-link" routerLink="/register">Registrate</a>
	</p>

</form>
