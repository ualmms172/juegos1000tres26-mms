# Configuracion externa de canales temporales de comunicacion
# Puedes sobreescribir la ruta de este fichero con:
# -D juegos1000tres.comunicacion.config.path=/ruta/comunicacion-runtime.properties
# o variable de entorno:
# JUEGOS1000TRES_COMUNICACION_CONFIG_PATH=/ruta/comunicacion-runtime.properties

api.tipoComunicacion=API
api.host=127.0.0.1
api.puerto=8081
api.endpoint.salaTemplate=/api/salas/%s/eventos
api.endpoint.actualizaciones.salaTemplate=/api/salas/%s/actualizaciones
api.payloadInicial={}

ws.tipoComunicacion=WEBSOCKET
ws.host=0.0.0.0
ws.puerto=8091
ws.canal.salaTemplate=/ws/salas/%s
ws.payloadVacio={}
