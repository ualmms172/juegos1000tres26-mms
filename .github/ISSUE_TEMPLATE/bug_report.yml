name: "Reporte de bug"
description: "Informa un error para que podamos reproducirlo y corregirlo"
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar este problema.
        Por favor, completa toda la información posible.

  - type: textarea
    id: descripcion
    attributes:
      label: Descripcion del problema
      description: Explica claramente que sucede.
      placeholder: "Al intentar unirme a una partida, la pantalla se queda en carga..."
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducir
      description: Describe paso a paso como llegar al error.
      placeholder: |
        1. Ir a ...
        2. Pulsar en ...
        3. Ver error ...
    validations:
      required: true

  - type: textarea
    id: resultado_esperado
    attributes:
      label: Resultado esperado
      description: Que esperabas que pasara.
      placeholder: "Deberia entrar a la sala correctamente."
    validations:
      required: true

  - type: textarea
    id: capturas
    attributes:
      label: Capturas o logs
      description: Si aplica, pega logs o adjunta capturas.
      placeholder: "Pega aqui mensajes de error, stacktrace o imagenes."

  - type: input
    id: entorno
    attributes:
      label: Entorno
      description: Sistema operativo, navegador, dispositivo, etc.
      placeholder: "Windows 11, Chrome 134, Movil Android..."

  - type: dropdown
    id: severidad
    attributes:
      label: Severidad
      options:
        - Baja
        - Media
        - Alta
        - Critica
    validations:
      required: true
