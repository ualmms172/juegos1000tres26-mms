<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba WebSocket - Pantalla</title>
    <link rel="stylesheet" href="{{ url_for('.static', filename='css/prueba_websocket.css') }}">
</head>
<body>
    <script>
        window.PRUEBA_WEBSOCKET_SALA_ID = {{ sala_id | tojson }};
    </script>
    <main class="page">
        <section class="panel">
            <header class="panel-header">
                <h1>Pantalla compartida</h1>
                <p>Lista de jugadores y todas las palabras escritas por cada uno.</p>
                <p class="status" id="estadoConexion">Conectando...</p>
            </header>

            <section class="board" aria-live="polite">
                <h2>Estado de jugadores</h2>
                <div id="jugadoresBoard" class="board-content">
                    <p class="muted">Aun no hay actividad.</p>
                </div>
            </section>
        </section>
    </main>

    <script>
        window.PRUEBA_WEBSOCKET_URL_PANTALLA = {{ ws_pantalla_url | tojson }};
    </script>
    <script type="module" src="{{ url_for('.static', filename='js/prueba_websocket_pantalla.js') }}"></script>
</body>
</html>
