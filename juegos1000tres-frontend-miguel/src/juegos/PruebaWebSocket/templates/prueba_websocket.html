<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba WebSocket - Jugador</title>
    <link rel="stylesheet" href="{{ url_for('.static', filename='css/prueba_websocket.css') }}">
</head>
<body>
    <main class="page">
        <section class="panel">
            <header class="panel-header">
                <h1>Prueba WebSocket</h1>
                <p>Jugador: envia texto y recibe todo lo que se escribe.</p>
                <p class="status" id="estadoConexion">Conectando...</p>
            </header>

            <div class="config-row">
                <label for="nombreJugador">Nombre</label>
                <input id="nombreJugador" type="text" maxlength="40" placeholder="Ejemplo: Ana">
                <a class="link-btn" href="/server/prueba_websocket/pantalla" target="_blank" rel="noopener noreferrer">Abrir Pantalla</a>
            </div>

            <div class="send-row">
                <input id="textoInput" type="text" maxlength="120" placeholder="Escribe algo...">
                <button id="enviarBtn" type="button">Enviar</button>
            </div>

            <section class="feed" aria-live="polite">
                <h2>Historial global</h2>
                <ul id="mensajesList">
                    <li class="muted">Aun no hay mensajes.</li>
                </ul>
            </section>
        </section>
    </main>

    <script>
        window.PRUEBA_WEBSOCKET_URL_JUGADORES = {{ ws_jugadores_url | tojson }};
    </script>
    <script type="module" src="{{ url_for('.static', filename='js/prueba_websocket.js') }}"></script>
</body>
</html>
